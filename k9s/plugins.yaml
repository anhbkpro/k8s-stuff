# ~/.config/k9s/plugins.yaml
# Custom cluster commands. Available arg vars: $NAME $NAMESPACE $CONTAINER $POD
# $CONTEXT $CLUSTER $RESOURCE_GROUP $RESOURCE_VERSION $FILTER $COL-<COLUMN>.
plugins:
  # Ctrl-L: tail app logs with stern, excluding the istio-proxy sidecar.
  # Adds timestamps for cross-pod correlation. Needs `stern` on PATH.
  stern:
    shortCut: Ctrl-L
    description: Stern logs (no sidecar)
    scopes:
    - po
    command: stern
    background: false
    args:
    - --tail=50
    - --timestamps
    - --exclude-container
    - istio-proxy
    - $NAME
    - -n
    - $NAMESPACE
    - --context
    - $CONTEXT

  # Shift-L: same as above but includes ALL containers (envoy/istio-proxy too).
  stern-all:
    shortCut: Shift-L
    description: Stern logs (all containers)
    scopes:
    - po
    command: stern
    background: false
    args:
    - --tail=50
    - --timestamps
    - $NAME
    - -n
    - $NAMESPACE
    - --context
    - $CONTEXT

  # Shift-E: events scoped to the selected object, paged through less.
  events:
    shortCut: Shift-E
    description: Object events
    scopes:
    - all
    command: sh
    background: false
    args:
    - -c
    - "kubectl get events --field-selector involvedObject.name=$NAME -n $NAMESPACE --context $CONTEXT | less"

  # Ctrl-J: dump selected resource as YAML into your pager.
  yaml-view:
    shortCut: Ctrl-J
    description: YAML to pager
    scopes:
    - all
    command: sh
    background: false
    args:
    - -c
    - "kubectl get $RESOURCE_GROUP/$NAME -n $NAMESPACE --context $CONTEXT -o yaml | less"

  # Shift-K: ephemeral debug container on the selected pod (needs k8s >=1.25).
  debug:
    shortCut: Shift-K
    description: Debug container
    scopes:
    - po
    command: kubectl
    background: false
    args:
    - debug
    - -it
    - $NAME
    - -n
    - $NAMESPACE
    - --context
    - $CONTEXT
    - --image=nicolaka/netshoot
    - --target=$CONTAINER

  # Shift-G: open Grafana's pod dashboard for the selected pod in the browser.
  # COMMENTED OUT until you fill in your Grafana host + dashboard UID/slug.
  # Customize:
  #   1. YOUR-GRAFANA-HOST  -> your Grafana base URL (e.g. localhost:3000 if port-forwarded)
  #   2. DASHBOARD_UID/kubernetes-pod -> copy /d/<uid>/<slug> from the dashboard's URL
  #   3. var-namespace / var-pod -> match your dashboard's template variable names
  #      (kube-prometheus-stack's "Compute Resources / Pod" uses these defaults)
  # On Linux, change `command: open` to `command: xdg-open`.
  grafana:
    shortCut: Shift-G
    description: Grafana (pod)
    scopes:
    - po
    command: open
    background: true
    args:
    - "http://localhost:3000/d/c71c43db-3b65-4804-aadf-398761fbf2aa/kubernetes-pod?var-namespace=$NAMESPACE&var-pod=$NAME&from=now-1h&to=now"
